name: Count Lines & Languages

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  count-lines:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cloc
        run: |
          sudo apt-get update
          sudo apt-get install -y cloc jq

      - name: Get all repos
        run: |
          if [ -n "${{ secrets.PAT_TOKEN }}" ]; then
            echo "✅ Using PAT_TOKEN"
            TOKEN="${{ secrets.PAT_TOKEN }}"
          else
            echo "⚠️ Using GITHUB_TOKEN (public only)"
            TOKEN="${{ secrets.GITHUB_TOKEN }}"
          fi

          curl -s -H "Authorization: token $TOKEN" \
               -H "Accept: application/vnd.github.v3+json" \
               "https://api.github.com/user/repos?per_page=100&affiliation=owner" > personal_repos.json

          curl -s -H "Authorization: token $TOKEN" \
               -H "Accept: application/vnd.github.v3+json" \
               "https://api.github.com/orgs/RoboNexxus/repos?per_page=100" > org_repos.json

          if jq -e 'type == "array"' personal_repos.json > /dev/null 2>&1; then
            jq -r '.[] | "AtharvM02222/\(.name)"' personal_repos.json > repo_list.txt
            echo "✅ Found $(wc -l < repo_list.txt) personal repos"
          else
            echo "❌ Failed to get personal repos"
            cat personal_repos.json
            touch repo_list.txt
          fi

          if jq -e 'type == "array"' org_repos.json > /dev/null 2>&1; then
            jq -r '.[] | "RoboNexxus/\(.name)"' org_repos.json >> repo_list.txt
            echo "✅ Found $(jq -r 'length' org_repos.json) RoboNexus repos"
          else
            echo "⚠️ Could not access RoboNexus org repos"
          fi

          echo "📊 Total: $(wc -l < repo_list.txt) repositories"
          cat repo_list.txt

      - name: Clone and count lines with language stats
        env:
          TOKEN: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          total_code=0
          total_comments=0
          total_blanks=0
          repo_count=0

          declare -A lang_lines

          mkdir -p temp_repos

          while IFS= read -r repo; do
            echo "Processing $repo..."
            git clone --depth 1 https://x-access-token:${TOKEN}@github.com/$repo.git temp_repos/$repo 2>/dev/null || continue

            cloc temp_repos/$repo --json --quiet > cloc_output.json 2>/dev/null || continue

            code=$(jq -r '.SUM.code // 0' cloc_output.json)
            comments=$(jq -r '.SUM.comment // 0' cloc_output.json)
            blanks=$(jq -r '.SUM.blank // 0' cloc_output.json)

            if [ "$code" -gt 0 ]; then
              total_code=$((total_code + code))
              total_comments=$((total_comments + comments))
              total_blanks=$((total_blanks + blanks))
              repo_count=$((repo_count + 1))
              echo "  ✓ $repo: $code lines of code"

              for lang in Python JavaScript C# "C++" HTML CSS TypeScript Bash C "C/C++ Header" Java Rust Go PHP Ruby Swift Kotlin; do
                lang_code=$(jq -r --arg lang "$lang" '.[$lang].code // 0' cloc_output.json)
                if [ "$lang_code" -gt 0 ]; then
                  normalized_lang=$(echo "$lang" | sed 's/C++/CPP/g; s/C#/CSharp/g; s/C\/C++ Header/CPP/g' | tr -d ' ')
                  current_val=${lang_lines[$normalized_lang]:-0}
                  lang_lines[$normalized_lang]=$((current_val + lang_code))
                fi
              done
            fi

            rm -rf temp_repos/$repo
          done < repo_list.txt

          total_lines=$((total_code + total_comments + total_blanks))

          echo "TOTAL_LINES=$total_lines" >> $GITHUB_ENV
          echo "TOTAL_CODE=$total_code" >> $GITHUB_ENV
          echo "REPO_COUNT=$repo_count" >> $GITHUB_ENV

          echo "================================"
          echo "Total Lines: $total_lines"
          echo "Code Lines:  $total_code"
          echo "Comments:    $total_comments"
          echo "Blanks:      $total_blanks"
          echo "Repos:       $repo_count"
          echo "================================"

          if [ "$total_code" -gt 0 ]; then
            for lang in "${!lang_lines[@]}"; do
              echo "$lang ${lang_lines[$lang]}"
            done | sort -rn -k2 | head -5 > top_langs_raw.txt

            echo "Top Languages:"
            cat top_langs_raw.txt

            rank=1
            while IFS= read -r line; do
              lang=$(echo "$line" | awk '{print $1}')
              lines=$(echo "$line" | awk '{print $2}')
              pct=$(awk "BEGIN {printf \"%.1f\", ($lines / $total_code) * 100}")
              echo "LANG${rank}=$lang" >> $GITHUB_ENV
              echo "LANG${rank}_LINES=$lines" >> $GITHUB_ENV
              echo "LANG${rank}_PCT=$pct" >> $GITHUB_ENV
              rank=$((rank + 1))
              [ $rank -gt 3 ] && break
            done < top_langs_raw.txt
          fi

      - name: Update README with stats and languages
        run: |
          python3 << 'PYEOF'
          import re, os

          total_lines = os.environ.get("TOTAL_LINES", "0")
          repo_count  = os.environ.get("REPO_COUNT", "0")
          lang1       = os.environ.get("LANG1", "")
          lang1_lines = os.environ.get("LANG1_LINES", "0")
          lang1_pct   = os.environ.get("LANG1_PCT", "0")
          lang2       = os.environ.get("LANG2", "")
          lang2_lines = os.environ.get("LANG2_LINES", "0")
          lang2_pct   = os.environ.get("LANG2_PCT", "0")
          lang3       = os.environ.get("LANG3", "")
          lang3_lines = os.environ.get("LANG3_LINES", "0")
          lang3_pct   = os.environ.get("LANG3_PCT", "0")

          with open("README.md", "r", encoding="utf-8") as f:
              content = f.read()

          # Update total lines badge
          content = re.sub(
              r'Total_Lines-[^"\'<\s]+-00d9ff',
              f'Total_Lines-{total_lines}-00d9ff',
              content
          )

          # Update repositories badge
          content = re.sub(
              r'Repositories-\d+-00d9ff',
              f'Repositories-{repo_count}-00d9ff',
              content
          )

          # Update "Across all X repositories" text
          content = re.sub(
              r'Across all \d+ repositories',
              f'Across all {repo_count} repositories',
              content
          )

          # Update language stats section if markers exist
          if "<!-- LANG_STATS_START -->" in content:
              from datetime import datetime, timezone
              now = datetime.now(timezone.utc).strftime("%Y-%m-%d %H:%M UTC")
              lang_section = f"""<!-- LANG_STATS_START -->
          **Top Languages by Lines of Code:**

          ![Lang1](https://img.shields.io/badge/{lang1}-{lang1_lines}_lines_({lang1_pct}%25)-00d9ff?style=for-the-badge)
          ![Lang2](https://img.shields.io/badge/{lang2}-{lang2_lines}_lines_({lang2_pct}%25)-00d9ff?style=for-the-badge)
          ![Lang3](https://img.shields.io/badge/{lang3}-{lang3_lines}_lines_({lang3_pct}%25)-00d9ff?style=for-the-badge)

          *Last updated: {now}*
          <!-- LANG_STATS_END -->"""

              content = re.sub(
                  r'<!-- LANG_STATS_START -->.*?<!-- LANG_STATS_END -->',
                  lang_section,
                  content,
                  flags=re.DOTALL
              )

          with open("README.md", "w", encoding="utf-8") as f:
              f.write(content)

          print(f"✅ Updated README: {total_lines} lines, {repo_count} repos")
          print(f"   Top: {lang1} ({lang1_pct}%), {lang2} ({lang2_pct}%), {lang3} ({lang3_pct}%)")
          PYEOF

      - name: Commit changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "github-actions[bot]"
          git add README.md

          if git diff --quiet && git diff --staged --quiet; then
            echo "✅ No changes to commit"
            exit 0
          fi

          git commit -m "📊 Update code stats: ${{ env.TOTAL_LINES }} lines across ${{ env.REPO_COUNT }} repos | Top: ${{ env.LANG1 }} (${{ env.LANG1_PCT }}%)"

          for i in 1 2 3; do
            git push https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }} HEAD:main && break
            echo "⚠️ Push failed (attempt $i), rebasing..."
            git pull --rebase https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }} main
          done
